# Render Blueprint — monorepo: build frontend + run Express API (serves SPA from frontend/dist)
services:
  - type: web
    name: sentinal-api
    runtime: node
    # Must run from monorepo root so frontend/dist is created before API start
    rootDir: .
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
