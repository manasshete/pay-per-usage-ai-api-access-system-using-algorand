services:
  - type: web
    name: sentinel-chat
    runtime: node
    rootDir: chatbot/chat-backend
    buildCommand: >
      cd ../chat-front &&
      yarn &&
      yarn build &&
      cd ../chat-backend &&
      npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: VITE_SENTINEL_MARKETPLACE_URL
        sync: false
      - key: VITE_CHAT_BACKEND_URL
        value: ""
      - key: VITE_CHATBOT_URL
        sync: false
      - key: VITE_SENTINEL_API_URL
        sync: false
      - key: SENTINEL_API_URL
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
